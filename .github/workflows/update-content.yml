name: 每日更新内容

on:
  schedule:
    # 每天 7:00 更新 AI 日报
    - cron: '0 23 * * *'  # UTC 23:00 = 北京时间 7:00
    # 每天 10:00 更新 GitHub 精选
    - cron: '0 2 * * *'   # UTC 2:00 = 北京时间 10:00
    # 每天 12:00 更新大咖知识库
    - cron: '0 4 * * *'   # UTC 4:00 = 北京时间 12:00
    # 每天 18:00 更新大咖知识库
    - cron: '0 10 * * *'  # UTC 10:00 = 北京时间 18:00
  workflow_dispatch:  # 支持手动触发

jobs:
  update-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: pip install -r requirements.txt
      
    - name: 生成内容
      run: python scripts/generate-content.py
      
    - name: 提交更新
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add data/
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动更新内容 $(date +%Y-%m-%d)"
        git push
