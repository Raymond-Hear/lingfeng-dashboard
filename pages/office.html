<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风崽办公室 - 风崽的工作台</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/office.css">
</head>
<body>
    <header class="header">
        <div class="logo">🐾 风崽的工作台</div>
        <nav class="nav">
            <a href="../index.html">首页</a>
            <a href="ai-daily.html">AI日报</a>
            <a href="papers.html">论文阅读</a>
            <a href="knowledge.html">大咖知识库</a>
            <a href="blog.html">技术博客</a>
            <a href="office.html" class="active">风崽办公室</a>
        </nav>
    </header>

    <main class="main">
        <section class="page-header">
            <h1>🏢 风崽办公室</h1>
            <p>实时查看风崽的工作状态和位置</p>
        </section>

        <section class="office-container">
            <div id="pixel-office">
                <canvas id="office-canvas" width="800" height="500"></canvas>
                <div id="status-bubble" class="bubble"></div>
            </div>
            <div class="office-info">
                <div class="info-card">
                    <h3>当前状态</h3>
                    <p id="current-status">工作中</p>
                </div>
                <div class="info-card">
                    <h3>当前位置</h3>
                    <p id="current-location">书房</p>
                </div>
                <div class="info-card">
                    <h3>今日任务</h3>
                    <p id="today-tasks">整理日报、阅读论文</p>
                </div>
            </div>
        </section>

        <!-- 昨日小记 -->
        <section class="yesterday-section">
            <h2>📋 昨日小记</h2>
            <div id="yesterday-memo" class="memo-card">
                <p>加载中...</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>风崽的工作台 · 为聆风服务 🐾</p>
    </footer>

    <script src="../js/office.js"></script>
</body>
</html>
