<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风崽的工作台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">🐾 风崽的工作台</div>
        <nav class="nav">
            <a href="index.html" class="active">首页</a>
            <a href="pages/ai-daily.html">AI日报</a>
            <a href="pages/papers.html">论文阅读</a>
            <a href="pages/knowledge.html">大咖知识库</a>
            <a href="pages/blog.html">技术博客</a>
            <a href="pages/office.html">风崽办公室</a>
        </nav>
    </header>

    <!-- 主内容 -->
    <main class="main">
        <!-- 今日概览 -->
        <section class="hero">
            <h1>今日工作概览</h1>
            <p class="date" id="current-date"></p>
        </section>

        <!-- 今日更新板块 -->
        <div class="dashboard">
            <!-- AI日报 -->
            <section class="card">
                <div class="card-header">
                    <h2>📊 AI日报</h2>
                    <span class="badge" id="ai-daily-count">0 篇</span>
                </div>
                <div class="card-body" id="ai-daily-preview">
                    <p class="loading">加载中...</p>
                </div>
                <a href="pages/ai-daily.html" class="btn-primary">查看今日日报</a>
            </section>

            <!-- 论文阅读 -->
            <section class="card">
                <div class="card-header">
                    <h2>📑 论文阅读</h2>
                    <span class="badge" id="papers-count">0 篇</span>
                </div>
                <div class="card-body" id="papers-preview">
                    <p class="loading">加载中...</p>
                </div>
                <a href="pages/papers.html" class="btn-primary">查看今日论文</a>
            </section>

            <!-- 大咖知识库 -->
            <section class="card">
                <div class="card-header">
                    <h2>📚 大咖知识库</h2>
                    <span class="badge" id="knowledge-count">0 篇</span>
                </div>
                <div class="card-body" id="knowledge-preview">
                    <p class="loading">加载中...</p>
                </div>
                <a href="pages/knowledge.html" class="btn-primary">查看今日更新</a>
            </section>

            <!-- 技术博客 -->
            <section class="card">
                <div class="card-header">
                    <h2>📝 技术博客</h2>
                    <span class="badge" id="blog-count">0 篇</span>
                </div>
                <div class="card-body" id="blog-preview">
                    <p class="empty">暂无文章</p>
                </div>
                <a href="pages/blog.html" class="btn-primary">查看全部文章</a>
            </section>

            <!-- 风崽办公室 -->
            <section class="card card-office">
                <div class="card-header">
                    <h2>🏢 风崽办公室</h2>
                    <span class="status-online">在线</span>
                </div>
                <div class="card-body office-preview">
                    <p>实时查看风崽的工作状态</p>
                    <div class="office-mini">🐾 工作中...</div>
                </div>
                <a href="pages/office.html" class="btn-primary">进入办公室</a>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>风崽的工作台 · 为聆风服务 🐾</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
