<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风崽的工作台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">🐾 风崽的工作台</div>
        <nav class="nav">
            <a href="#office">风崽状态</a>
            <a href="#ai-daily">AI日报</a>
            <a href="#github">GitHub精选</a>
            <a href="#knowledge">大咖知识库</a>
        </nav>
    </header>

    <!-- 主内容区 -->
    <main class="main">
        <!-- 风崽的办公室 -->
        <section id="office" class="section">
            <h2 class="section-title">风崽的办公室</h2>
            <div class="office-container">
                <div id="pixel-office">
                    <canvas id="office-canvas" width="800" height="500"></canvas>
                    <div id="status-bubble" class="bubble"></div>
                </div>
                <div class="status-bar">
                    <span id="current-status">风崽准备就绪</span>
                    <span id="current-time"></span>
                </div>
            </div>
        </section>

        <!-- AI 日报 -->
        <section id="ai-daily" class="section">
            <h2 class="section-title">📊 AI 日报</h2>
            <p class="section-desc">每日自动抓取 Hacker News 等 90+ 技术博客，AI 评分筛选高质量文章</p>
            <div class="content-grid" id="ai-daily-content">
                <!-- 动态加载今日内容 -->
            </div>
            <button class="btn-more" onclick="showMore('ai-daily')">查看更多历史日报</button>
        </section>

        <!-- GitHub 每日精选 -->
        <section id="github" class="section">
            <h2 class="section-title">⭐ GitHub 每日精选</h2>
            <p class="section-desc">基于聆风兴趣领域，每日推荐 AI 内容创作、课程制作、效率工具相关开源项目</p>
            <div class="content-grid" id="github-content">
                <!-- 动态加载今日内容 -->
            </div>
            <button class="btn-more" onclick="showMore('github')">查看全部历史推荐</button>
        </section>

        <!-- 大咖知识库 -->
        <section id="knowledge" class="section">
            <h2 class="section-title">📚 大咖知识库</h2>
            <p class="section-desc">追踪 Dan Koe、Lenny Rachitsky、Naval、Andrej Karpathy 最新文章</p>
            <div class="content-grid" id="knowledge-content">
                <!-- 动态加载最新文章 -->
            </div>
            <button class="btn-more" onclick="showMore('knowledge')">查看全部文章</button>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>风崽的工作台 · 为聆风服务 🐾</p>
    </footer>

    <!-- 更多内容弹窗 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/office.js"></script>
    <script src="js/content.js"></script>
</body>
</html>
